org.gradle.jvmargs=-Xmx1536M -XX:MaxMetaspaceSize=512m -Djava.io.tmpdir=D:/AllProject/FlutterProjects/mark_recoder/.build-temp
android.useAndroidX=true
# 低内存/磁盘环境：限制并行、Kotlin 编译器在 Gradle 进程内执行（不再额外起一个 JVM），
# 关闭增量编译（避免跨盘缓存问题），所有临时文件落到项目内 .build-temp。
org.gradle.workers.max=2
kotlin.compiler.execution.strategy=in-process
kotlin.incremental=false
